<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>스미마셍 🇯🇵 한일 통역기</title>
<style>
  :root{
    --bg:#0e1116; --panel-ja:#16202b; --panel-ko:#1a1410;
    --ink:#f4f1ea; --dim:#8a93a0; --accent:#e8915b; --accent2:#5ba0e8;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{
    background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Hiragino Kaku Gothic ProN","Segoe UI",sans-serif;
    height:100dvh; display:flex; flex-direction:column; overflow:hidden;
  }

  .panel{ flex:1 1 0; min-height:0; position:relative; display:flex; flex-direction:column; align-items:stretch; }
  .panel.them{ background:var(--panel-ja); transform:rotate(180deg); }
  .panel.me{ background:var(--panel-ko); }
  .divider{ height:1px; background:linear-gradient(90deg,transparent,#2c3947,transparent); flex:0 0 auto; }

  .tag{ position:absolute; top:10px; left:0; right:0; text-align:center; font-size:11px; letter-spacing:.08em; color:var(--dim); text-transform:uppercase; pointer-events:none; z-index:1; }
  .panel.them .tag{ color:#6f8aa8; }

  /* 스크롤 영역: 내용이 길어도 패널 안에서 스크롤, 버튼은 안 밀림 */
  .scroll{ flex:1 1 auto; min-height:0; width:100%; overflow-y:auto; overscroll-behavior:contain; display:flex; padding:34px 18px 6px; -webkit-overflow-scrolling:touch; }
  .bubble{ margin:auto; width:100%; max-width:560px; text-align:center; }
  .src{ font-size:14px; color:var(--dim); margin-bottom:10px; line-height:1.4; }
  .src .interim{ color:var(--accent); }
  .main-ja{ font-size:27px; font-weight:700; line-height:1.35; word-break:break-word; }
  .yomi{ margin-top:12px; font-size:19px; font-weight:600; color:var(--accent); line-height:1.5; word-break:break-word; }
  .panel.them .yomi{ color:var(--accent2); }
  .placeholder{ font-size:17px; color:#46505c; font-weight:500; }

  .controls{ flex:0 0 auto; display:flex; gap:10px; align-items:center; justify-content:center; flex-wrap:wrap; padding:10px 16px calc(12px + env(safe-area-inset-bottom)); }
  .mic{ border:none; border-radius:999px; padding:15px 26px; font-size:17px; font-weight:700; color:#0e1116; cursor:pointer; display:flex; align-items:center; gap:9px; transition:transform .08s, box-shadow .2s; }
  .mic:active{ transform:scale(.96); }
  .panel.me .mic{ background:var(--accent); }
  .panel.them .mic{ background:var(--accent2); }
  .mic.live{ animation:pulse 1s infinite; box-shadow:0 0 0 0 rgba(232,145,91,.5); }
  .panel.them .mic.live{ box-shadow:0 0 0 0 rgba(91,160,232,.5); }
  @keyframes pulse{ 70%{ box-shadow:0 0 0 16px rgba(232,145,91,0);} 100%{box-shadow:0 0 0 0 rgba(232,145,91,0);} }
  .iconbtn{ border:1.5px solid #3a4654; background:transparent; color:var(--dim); border-radius:999px; min-width:48px; height:48px; padding:0 13px; font-size:18px; cursor:pointer; }
  .iconbtn:active{ background:#ffffff14; }

  #gear{ position:fixed; top:8px; right:10px; z-index:20; background:#0008; color:#cfd6df; border:none; border-radius:8px; padding:5px 9px; font-size:15px; cursor:pointer; }
  #status{ position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:#000b; color:#fff; padding:8px 16px; border-radius:999px; font-size:14px; z-index:30; display:none; pointer-events:none; }

  .overlay{ position:fixed; inset:0; background:#0e1116ee; backdrop-filter:blur(6px); z-index:40; display:flex; align-items:center; justify-content:center; padding:24px; }
  .overlay .card{ width:100%; max-width:440px; max-height:80vh; overflow:auto; background:#16202b; border:1px solid #2c3947; border-radius:16px; padding:22px; }
  .card h2{ margin:0 0 6px; font-size:20px; }
  .card p{ margin:0 0 16px; color:var(--dim); font-size:14px; line-height:1.5; }
  .card input{ width:100%; padding:12px 14px; border-radius:10px; border:1px solid #2c3947; background:#0e1116; color:var(--ink); font-size:15px; margin-bottom:14px; }
  .card .primary{ width:100%; padding:13px; border:none; border-radius:10px; background:var(--accent); color:#0e1116; font-size:16px; font-weight:700; cursor:pointer; }
  .card .head{ display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
  .card .head h2{ margin:0; } .card .x{ background:none; border:none; color:var(--dim); font-size:22px; cursor:pointer; }
  .fav{ display:flex; align-items:center; gap:10px; padding:12px; border:1px solid #2c3947; border-radius:12px; margin-bottom:10px; cursor:pointer; }
  .fav:active{ background:#ffffff10; }
  .fav .txt{ flex:1; min-width:0; }
  .fav .ko{ font-size:15px; font-weight:600; } .fav .ja{ font-size:14px; color:#9fb4ca; margin-top:2px; } .fav .ym{ font-size:13px; color:var(--accent); margin-top:2px; }
  .fav .del{ background:none; border:none; color:#6b7785; font-size:18px; padding:6px; cursor:pointer; }
  .empty{ color:#46505c; text-align:center; padding:24px 0; }
  .hidden{ display:none !important; }

  /* 바 모드: 폰을 가로로 돌리면 좌/우로 나뉘고, 둘 다 똑바로(나란히 앉은 상황) */
  @media (orientation:landscape){
    body{ flex-direction:row; }
    .divider{ width:1px; height:auto; background:linear-gradient(180deg,transparent,#2c3947,transparent); }
    .panel.them{ transform:none; }
    .scroll{ padding-top:26px; }
    .main-ja{ font-size:24px; } .yomi{ font-size:17px; }
  }
</style>
</head>
<body>

  <div class="panel them">
    <div class="tag">相手 · 日本語</div>
    <div class="scroll"><div class="bubble">
      <div class="src" id="srcThem"></div>
      <div class="main-ja" id="mainThem"><span class="placeholder">ボタンを押して話してください</span></div>
      <div class="yomi" id="yomiThem"></div>
    </div></div>
    <div class="controls"><button class="mic" id="micThem">🎤 日本語で話す</button><button class="iconbtn" id="speakThem" title="読み上げ">🔊</button></div>
  </div>

  <div class="divider"></div>

  <div class="panel me">
    <div class="tag">나 · 한국어</div>
    <div class="scroll"><div class="bubble">
      <div class="src" id="srcMe"></div>
      <div class="main-ja" id="mainMe"><span class="placeholder">버튼을 눌러 한국어로 말하기</span></div>
      <div class="yomi" id="yomiMe"></div>
    </div></div>
    <div class="controls">
      <button class="mic" id="micMe">🎤 한국어로 말하기</button>
      <button class="iconbtn" id="speakMe" title="읽어주기">🔊</button>
      <button class="iconbtn" id="saveFav" title="즐겨찾기 저장">☆</button>
      <button class="iconbtn" id="openFav" title="즐겨찾기 목록">⭐︎</button>
    </div>
  </div>

  <button id="gear">⚙︎</button>
  <div id="status"></div>

  <!-- 암호 게이트 -->
  <div id="setup" class="overlay hidden">
    <div class="card">
      <h2>입장 암호</h2>
      <p id="setupMsg">공유받은 암호를 넣으면 이 기기에 기억됩니다.</p>
      <input id="passInput" type="password" placeholder="암호" autocomplete="off">
      <button class="primary" id="savePass">시작</button>
    </div>
  </div>

  <!-- 즐겨찾기 -->
  <div id="favBox" class="overlay hidden">
    <div class="card">
      <div class="head"><h2>⭐ 즐겨찾기</h2><button class="x" id="closeFav">✕</button></div>
      <div id="favList"></div>
    </div>
  </div>

<script>
const PASS_LS='jp_pass', FAV_LS='jp_favs';
const $=s=>document.querySelector(s);
const status=t=>{const el=$('#status'); if(!t){el.style.display='none';return;} el.textContent=t; el.style.display='block';};
const escapeHtml=s=>s.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));

const getPass=()=>localStorage.getItem(PASS_LS)||'';
function ensurePass(msg){ if(getPass()) return true; if(msg)$('#setupMsg').textContent=msg; $('#setup').classList.remove('hidden'); return false; }
$('#gear').onclick=()=>{ $('#passInput').value=getPass(); $('#setup').classList.remove('hidden'); };
$('#savePass').onclick=()=>{ const v=$('#passInput').value.trim(); if(v)localStorage.setItem(PASS_LS,v); $('#setup').classList.add('hidden'); };

/* ---------- 통역 (서버 프록시 호출, 스트리밍) ---------- */
async function interpretStream(text, dir, onDelta){
  const res = await fetch('/api/translate',{
    method:'POST', headers:{'content-type':'application/json'},
    body: JSON.stringify({ text, dir, pass:getPass() })
  });
  if(res.status===401){ localStorage.removeItem(PASS_LS); ensurePass('암호가 틀렸어요. 다시 입력해 주세요.'); throw new Error('암호 오류'); }
  if(!res.ok){ throw new Error('서버 오류 '+res.status); }
  const reader=res.body.getReader(); const dec=new TextDecoder();
  let buf='', acc='';
  while(true){
    const {value,done}=await reader.read(); if(done) break;
    buf+=dec.decode(value,{stream:true});
    let i;
    while((i=buf.indexOf('\n'))>=0){
      const line=buf.slice(0,i); buf=buf.slice(i+1);
      if(!line.startsWith('data:')) continue;
      const d=line.slice(5).trim(); if(!d||d==='[DONE]') continue;
      try{ const ev=JSON.parse(d);
        if(ev.type==='content_block_delta'&&ev.delta?.type==='text_delta'){ acc+=ev.delta.text; onDelta(acc); }
      }catch(e){}
    }
  }
  return acc;
}

/* ---------- 렌더링 ---------- */
let current=null, meSpeak=null, themSpeak=null;
const twoLines=acc=>{ const l=acc.split('\n'); return [ (l[0]||'').trim(), (l[1]||'').trim() ]; };

function renderKo2Ja(srcText, accText){
  const [ja, reading]=twoLines(accText);
  $('#srcMe').innerHTML='🗣️ '+escapeHtml(srcText);
  $('#mainMe').textContent=ja||'…'; $('#yomiMe').textContent=reading;
  $('#mainThem').textContent=ja||'…'; $('#yomiThem').textContent=''; $('#srcThem').textContent='';
  current={ko:srcText, ja, reading};
  meSpeak=themSpeak={t:ja, lang:'ja-JP'};   // 양쪽 다 일본어 문장
}
function renderJa2Ko(srcText, accText){
  const [ko, yomi]=twoLines(accText);
  $('#srcThem').textContent=srcText;
  $('#mainThem').textContent=ko||'…'; $('#yomiThem').textContent=yomi;   // 상대(일본인)가 한국어를 읽도록 가타카나 발음
  $('#mainMe').textContent=ko||'…'; $('#yomiMe').textContent=''; $('#srcMe').innerHTML='👂 상대방 말';
  meSpeak=themSpeak={t:ko, lang:'ko-KR'};    // 양쪽 다 한국어 문장
}

/* ---------- 읽어주기 (뉴럴 TTS, 버튼으로만) ---------- */
let player=null, audioReady=false;
const SILENT='data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAESsAACJWAAACABAAZGF0YQAAAAA=';
function unlockAudio(){ // iOS: 첫 사용자 제스처에서 오디오 잠금 해제
  if(!player) player=new Audio();
  if(audioReady) return;
  player.src=SILENT; player.play().then(()=>{audioReady=true;}).catch(()=>{});
}
function deviceSpeak(s){ // 폴백: 기기 내장 음성
  if(!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(s.t); u.lang=s.lang; u.rate=0.95;
  const v=speechSynthesis.getVoices().find(x=>x.lang&&x.lang.toLowerCase().startsWith(s.lang.slice(0,2)));
  if(v) u.voice=v; speechSynthesis.speak(u);
}
async function speak(s){
  if(!s||!s.t) return;
  unlockAudio();
  try{
    const res=await fetch('/api/tts',{ method:'POST', headers:{'content-type':'application/json'}, body:JSON.stringify({ text:s.t, lang:s.lang, pass:getPass() }) });
    if(res.ok){
      const url=URL.createObjectURL(await res.blob());
      if(!player) player=new Audio();
      player.pause(); player.src=url;
      await player.play();
      player.onended=()=>URL.revokeObjectURL(url);
      return;
    }
  }catch(e){}
  deviceSpeak(s); // 키 미설정/실패 시 기기 음성
}

/* ---------- 음성 인식 ---------- */
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
let rec=null, recording=null;
function startRec(dir){
  unlockAudio();
  if(!ensurePass()) return;
  if(!SR){ status('이 브라우저는 음성인식 미지원 (크롬 권장)'); setTimeout(()=>status(''),2500); return; }
  if(recording){ stopRec(); return; }
  rec=new SR(); rec.lang=dir==='ko2ja'?'ko-KR':'ja-JP'; rec.interimResults=true; rec.continuous=false; recording=dir;
  const micBtn=dir==='ko2ja'?$('#micMe'):$('#micThem');
  const srcEl=dir==='ko2ja'?$('#srcMe'):$('#srcThem');
  micBtn.classList.add('live'); srcEl.innerHTML='<span class="interim">…</span>';
  let finalText='';
  rec.onresult=e=>{ let interim=''; for(let i=e.resultIndex;i<e.results.length;i++){ const t=e.results[i][0].transcript; if(e.results[i].isFinal)finalText+=t; else interim+=t; } srcEl.innerHTML='<span class="interim">'+escapeHtml(finalText+interim)+'</span>'; };
  rec.onerror=e=>{ status('인식 오류: '+e.error); setTimeout(()=>status(''),2000); };
  rec.onend=async()=>{
    micBtn.classList.remove('live'); recording=null;
    const text=finalText.trim(); if(!text){ srcEl.textContent=''; return; }
    try{
      if(dir==='ko2ja') renderKo2Ja(text,'…'); else renderJa2Ko(text,'…');
      await interpretStream(text, dir, acc=>{ if(dir==='ko2ja') renderKo2Ja(text,acc); else renderJa2Ko(text,acc); });
    }catch(err){ status(err.message); setTimeout(()=>status(''),3500); }
  };
  try{ rec.start(); }catch(e){}
}
function stopRec(){ if(rec){ try{rec.stop();}catch(e){} } }

/* ---------- 즐겨찾기 ---------- */
const getFavs=()=>{ try{ return JSON.parse(localStorage.getItem(FAV_LS))||[]; }catch(e){ return []; } };
const setFavs=a=>localStorage.setItem(FAV_LS,JSON.stringify(a));
$('#saveFav').onclick=()=>{
  if(!current||!current.ja){ status('저장할 문장이 없어요'); setTimeout(()=>status(''),1500); return; }
  const favs=getFavs();
  if(favs.some(f=>f.ko===current.ko&&f.ja===current.ja)){ status('이미 저장됨'); setTimeout(()=>status(''),1200); return; }
  favs.unshift({ko:current.ko,ja:current.ja,reading:current.reading}); setFavs(favs);
  status('⭐ 저장됨'); setTimeout(()=>status(''),1200);
};
$('#openFav').onclick=()=>{ renderFavList(); $('#favBox').classList.remove('hidden'); };
$('#closeFav').onclick=()=>$('#favBox').classList.add('hidden');
function renderFavList(){
  const favs=getFavs(); const box=$('#favList');
  if(!favs.length){ box.innerHTML='<div class="empty">아직 저장된 문장이 없어요.<br>통역 후 ☆ 버튼으로 저장하세요.</div>'; return; }
  box.innerHTML='';
  favs.forEach((f,idx)=>{
    const row=document.createElement('div'); row.className='fav';
    row.innerHTML='<div class="txt"><div class="ko"></div><div class="ja"></div><div class="ym"></div></div><button class="del">✕</button>';
    row.querySelector('.ko').textContent=f.ko; row.querySelector('.ja').textContent=f.ja; row.querySelector('.ym').textContent=f.reading||'';
    row.querySelector('.txt').onclick=()=>{ renderKo2Ja(f.ko, f.ja+'\n'+(f.reading||'')); $('#favBox').classList.add('hidden'); };
    row.querySelector('.del').onclick=e=>{ e.stopPropagation(); const a=getFavs(); a.splice(idx,1); setFavs(a); renderFavList(); };
    box.appendChild(row);
  });
}

$('#micMe').onclick=()=>startRec('ko2ja');
$('#micThem').onclick=()=>startRec('ja2ko');
$('#speakMe').onclick=()=>speak(meSpeak);
$('#speakThem').onclick=()=>speak(themSpeak);

/* 모드 전환 안내 (세로=테이블 / 가로=바) */
const mq=window.matchMedia('(orientation:landscape)');
function flashMode(){ status(mq.matches?'🍶 바 모드 (나란히)':'🍽 테이블 모드 (마주봄)'); setTimeout(()=>status(''),1300); }
mq.addEventListener?.('change', flashMode);

if(window.speechSynthesis){ speechSynthesis.getVoices(); speechSynthesis.onvoiceschanged=()=>{}; }
if(!getPass()) $('#setup').classList.remove('hidden');
</script>
</body>
</html>
